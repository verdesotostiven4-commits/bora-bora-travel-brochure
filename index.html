<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#03111f" />
    <title>Bora Bora Paradise Agency | The Perfect Tourist Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app" id="app">
      <section class="gate-screen" id="gateScreen" aria-label="Waiting screen">
        <div class="gate-bg" id="gateBg"></div>
        <div class="water-shine"></div>
        <div class="flight-line"><span class="plane">✈</span></div>
        <div class="gate-panel">
          <img id="gateLogo" class="gate-logo" alt="Bora Bora Paradise Agency logo" />
          <p class="eyebrow light">Flight BB-1500 • Now boarding</p>
          <h1>The Perfect Tourist Experience</h1>
          <p class="gate-copy">Welcome passengers. Your all-inclusive Bora Bora journey is ready to begin.</p>
          <button id="beginBtn" class="begin-btn" type="button">Begin the Journey</button>
          <small>Press Enter to start • Use arrow keys to navigate</small>
        </div>
        <div class="status-strip">
          <span>Destination: Bora Bora</span><span>Gate: Paradise</span><span>Status: Ready</span>
        </div>
      </section>

      <main class="stage" id="stage" aria-live="polite">
        <section class="slide active" id="slideStage">
          <img id="slideImg" class="slide-img" alt="Bora Bora scene" />
          <div class="slide-gradient"></div>
          <div class="route-rail" id="routeRail"></div>
          <article class="content-card" id="contentCard"></article>
          <aside class="passport" id="passportCard">
            <span>Travel Passport</span>
            <strong id="passportStamp">BORA BORA</strong>
            <small id="passportStep">01 / 06</small>
          </aside>
        </section>

        <nav class="controls" aria-label="Slide controls">
          <button id="prevBtn" type="button">‹</button>
          <button id="nextBtn" type="button">Next Destination</button>
        </nav>
      </main>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
